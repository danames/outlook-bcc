<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Auto BCC settings</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      color: #201f1e;
      background: #ffffff;
    }
    h1 { font-size: 16px; margin: 0 0 4px; }
    p.hint { font-size: 12px; color: #605e5c; margin: 0 0 14px; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    input[type="email"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #8a8886;
      border-radius: 2px;
    }
    input[type="email"]:focus { outline: none; border-color: #0f6cbd; }
    .row { margin-top: 12px; display: flex; gap: 8px; }
    button {
      font-size: 14px;
      padding: 8px 14px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
    }
    #save { background: #0f6cbd; color: #fff; }
    #save:hover { background: #115ea3; }
    #clear { background: #f3f2f1; color: #201f1e; }
    #clear:hover { background: #e1dfdd; }
    #status { margin-top: 14px; font-size: 13px; min-height: 18px; }
    #status.ok { color: #107c10; }
    #status.err { color: #a4262c; }
  </style>
</head>
<body>
  <h1>Auto BCC</h1>
  <p class="hint">This address is added as BCC to every message you send. It's stored in your Outlook profile only.</p>

  <label for="bcc">BCC address</label>
  <input id="bcc" type="email" placeholder="archive@example.com" autocomplete="off"/>

  <div class="row">
    <button id="save">Save</button>
    <button id="clear">Turn off</button>
  </div>

  <div id="status"></div>

  <script type="text/javascript" src="taskpane.js"></script>
</body>
</html>
